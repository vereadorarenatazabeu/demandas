<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete - Demandas</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f7f6; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-search { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-abrir-busca { background: #1a73e8; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #tela-busca { display: none; text-align: center; }
        #inputBusca { width: 100%; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; font-size: 18px; box-sizing: border-box; outline: none; }
        #loading { color: #1a73e8; font-weight: bold; margin: 10px 0; display: none; }
        .resultados-lista { margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; }
        .card-resultado { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; }
        #tela-formulario { display: block; }
        .status-destaque { display: none; background: #fff3cd; padding: 15px; border-radius: 10px; border: 2px solid #ffeeba; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* Campo extra para Outros */
        #div-outro-assunto { display: none; margin-top: 10px; background: #f9f9f9; padding: 10px; border-left: 4px solid #1a73e8; border-radius: 4px; }

        .btn-enviar { background: #28a745; color: white; border: none; width: 100%; padding: 18px; margin-top: 25px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-voltar { background: #6c757d; color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        #msg-final { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-formulario">
        <div class="nav-search"><button class="btn-abrir-busca" onclick="mostrarBusca()">🔍 Localizar Demanda</button></div>
        <h2 id="titulo-form">Nova Demanda</h2>
        <form id="meuForm">
            <input type="hidden" id="linhaId">
            <div id="bloco-status-topo" class="status-destaque">
                <label style="color:#856404; margin-top:0;">ALTERAR STATUS:</label>
                <select id="statusTopo" onchange="sincronizarStatus(this.value)">
                    <option value="Pendente">🟡 Pendente</option>
                    <option value="Resolvido">🟢 Resolvido</option>
                </select>
            </div>
            <label>Nome do Cidadão:</label>
            <input type="text" id="nome">
            <label>Telefone:</label>
            <input type="text" id="telefone">
            
            <label>Assunto:</label>
            <select id="assunto" onchange="verificarOutros(this.value)">
                <option value="Saúde">Saúde</option>
                <option value="Educação">Educação</option>
                <option value="Outros">Outros...</option>
            </select>

            <div id="div-outro-assunto">
                <label>Especifique o Assunto:</label>
                <input type="text" id="assuntoExtra" placeholder="Ex: Zeladoria, IPTU, etc.">
            </div>

            <label>Descrição:</label>
            <textarea id="descricao" rows="4"></textarea>
            <div id="bloco-status-normal">
                <label>Status:</label>
                <select id="statusNormal" onchange="sincronizarStatus(this.value)">
                    <option value="Pendente">Pendente</option>
                    <option value="Resolvido">Resolvido</option>
                </select>
            </div>
            <button type="button" class="btn-enviar" id="btnAcao" onclick="enviar()">SALVAR REGISTRO</button>
            <div id="msg-final"></div>
        </form>
    </div>

    <div id="tela-busca">
        <h2>Localizar no Histórico</h2>
        <div class="search-input-wrapper">
            <input type="text" id="inputBusca" placeholder="Pesquisar..." oninput="debounceBusca()">
            <div id="loading">Consultando planilha...</div>
        </div>
        <div id="listaResultados" class="resultados-lista"></div>
        <button class="btn-voltar" onclick="mostrarForm()">⬅ Cancelar e Voltar</button>
    </div>
</div>

<script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzVRhKIE_cHfmUL3Niy3cqZNM4_c-QX-AmsHww5grOShDNJqf3tMwlcwECCcE-Mmgynvg/exec';
    let tempoBusca = null;
    let statusGlobal = "Pendente";

    function sincronizarStatus(v) {
        statusGlobal = v;
        document.getElementById('statusTopo').value = v;
        document.getElementById('statusNormal').value = v;
    }

    function verificarOutros(val) {
        const div = document.getElementById('div-outro-assunto');
        div.style.display = (val === "Outros") ? "block" : "none";
        if (val !== "Outros") document.getElementById('assuntoExtra').value = "";
    }

    function mostrarBusca() {
        document.getElementById('tela-formulario').style.display = 'none';
        document.getElementById('tela-busca').style.display = 'block';
        document.getElementById('inputBusca').focus();
    }

    function mostrarForm() {
        document.getElementById('tela-busca').style.display = 'none';
        document.getElementById('tela-formulario').style.display = 'block';
    }

    function debounceBusca() {
        clearTimeout(tempoBusca);
        const t = document.getElementById('inputBusca').value;
        if (t.length < 3) { document.getElementById('listaResultados').innerHTML = ""; return; }
        document.getElementById('loading').style.display = "block";
        tempoBusca = setTimeout(chamarGoogle, 600);
    }

    function chamarGoogle() {
        const t = document.getElementById('inputBusca').value;
        const script = document.createElement('script');
        script.src = `${WEBAPP_URL}?busca=${encodeURIComponent(t)}&callback=renderizarResultados`;
        document.body.appendChild(script);
        script.onload = () => { script.remove(); document.getElementById('loading').style.display = "none"; };
    }

    function renderizarResultados(dados) {
        const lista = document.getElementById('listaResultados');
        lista.innerHTML = "";
        if (dados.length === 0) { lista.innerHTML = "<p>Nenhuma demanda encontrada.</p>"; return; }
        dados.forEach(d => {
            const div = document.createElement('div');
            div.className = 'card-resultado';
            div.innerHTML = `<strong>${d.nome}</strong><small>${d.assunto} - ${d.data} [${d.status}]</small>`;
            div.onclick = () => preencherParaEdicao(d);
            lista.appendChild(div);
        });
    }

    function preencherParaEdicao(d) {
        document.getElementById('linhaId').value = d.linha;
        document.getElementById('nome').value = d.nome;
        document.getElementById('telefone').value = d.telefone;
        document.getElementById('descricao').value = d.descricao;
        sincronizarStatus(d.status);

        // Lógica para carregar o assunto
        const listaAssuntos = ["Saúde", "Educação"];
        if (listaAssuntos.includes(d.assunto)) {
            document.getElementById('assunto').value = d.assunto;
            verificarOutros(d.assunto);
        } else {
            document.getElementById('assunto').value = "Outros";
            verificarOutros("Outros");
            document.getElementById('assuntoExtra').value = d.assunto;
        }

        document.getElementById('titulo-form').innerText = "Editando Registro";
        document.getElementById('bloco-status-topo').style.display = "block";
        document.getElementById('bloco-status-normal').style.display = "none";
        document.getElementById('btnAcao').innerText = "ATUALIZAR DEMANDA";
        document.getElementById('btnAcao').style.background = "#ffc107";
        document.getElementById('btnAcao').style.color = "#000";
        mostrarForm();
    }

    function resetarTudo() {
        document.getElementById('meuForm').reset();
        document.getElementById('linhaId').value = "";
        verificarOutros("");
        document.getElementById('titulo-form').innerText = "Nova Demanda";
        document.getElementById('bloco-status-topo').style.display = "none";
        document.getElementById('bloco-status-normal').style.display = "block";
        document.getElementById('btnAcao').innerText = "SALVAR REGISTRO";
        document.getElementById('btnAcao').style.background = "#28a745";
        document.getElementById('btnAcao').style.color = "#fff";
        sincronizarStatus("Pendente");
    }

    async function enviar() {
        const btn = document.getElementById('btnAcao');
        const msg = document.getElementById('msg-final');
        btn.disabled = true;
        msg.innerText = "Gravando...";

        const params = new URLSearchParams();
        params.append('linhaId', document.getElementById('linhaId').value);
        params.append('nome', document.getElementById('nome').value);
        params.append('telefone', document.getElementById('telefone').value);
        params.append('assunto', document.getElementById('assunto').value);
        params.append('assuntoExtra', document.getElementById('assuntoExtra').value);
        params.append('descricao', document.getElementById('descricao').value);
        params.append('status', statusGlobal);

        try {
            await fetch(WEBAPP_URL, { method: 'POST', body: params, mode: 'no-cors' });
            msg.style.color = "green"; msg.innerText = "✅ Sucesso!";
            setTimeout(() => { msg.innerText = ""; resetarTudo(); }, 2000);
        } catch (e) {
            msg.style.color = "red"; msg.innerText = "❌ Erro ao salvar."; btn.disabled = false;
        }
    }
</script>
</body>
</html>
