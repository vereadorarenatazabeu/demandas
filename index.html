<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Demandas</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f8f9fa; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-lupa { background: #1a73e8; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        /* Lista de resultados da busca */
        #listaResultados { display: none; background: #eef2f7; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d1d9e6; }
        .item-busca { padding: 10px; border-bottom: 1px solid #ccc; cursor: pointer; font-size: 14px; }
        .item-busca:last-child { border-bottom: none; }
        .item-busca:hover { background: #dce4f0; }

        .status-destaque { background: #fff3cd; padding: 15px; border-radius: 8px; border: 2px solid #ffeeba; margin-bottom: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn-submit { background: #28a745; color: white; border: none; width: 100%; padding: 16px; margin-top: 20px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; }
        .modo-edicao { border-left: 5px solid #ffc107; padding-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Demandas</h2>

    <div class="search-box">
        <input type="text" id="busca" placeholder="Localizar demanda (Nome/Tel)...">
        <button type="button" class="btn-lupa" onclick="pesquisar()">🔍</button>
    </div>

    <div id="listaResultados"></div>

    <form id="formDemanda">
        <input type="hidden" id="linhaId">

        <div class="status-destaque">
            <label style="color:#856404; margin-top:0;">STATUS DA DEMANDA:</label>
            <select id="status" style="border: 2px solid #856404; font-weight: bold;">
                <option value="Pendente">🟡 Pendente</option>
                <option value="Resolvido">🟢 Resolvido</option>
            </select>
        </div>

        <label>Nome do Cidadão:</label>
        <input type="text" id="nome">

        <label>Telefone:</label>
        <input type="text" id="telefone">

        <label>Assunto:</label>
        <select id="assunto">
            <option value="Zeladoria">Zeladoria</option>
            <option value="Saúde">Saúde</option>
            <option value="Educação">Educação</option>
            <option value="Segurança">Segurança</option>
            <option value="Indicação">Indicação Legislativa</option>
            <option value="Outros">Outros</option>
        </select>

        <label>Descrição:</label>
        <textarea id="descricao" rows="3"></textarea>

        <button type="button" class="btn-submit" id="btnSalvar" onclick="enviar()">SALVAR ALTERAÇÕES</button>
        <div id="status-msg"></div>
        <button type="button" id="btnLimpar" onclick="limparForm()" style="width:100%; background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">Limpar / Nova Demanda</button>
    </form>
</div>

<script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzVRhKIE_cHfmUL3Niy3cqZNM4_c-QX-AmsHww5grOShDNJqf3tMwlcwECCcE-Mmgynvg/exec';

    function pesquisar() {
        const termo = document.getElementById('busca').value;
        if (!termo) return;
        const msg = document.getElementById('status-msg');
        msg.innerText = "Buscando...";

        const script = document.createElement('script');
        script.src = `${WEBAPP_URL}?busca=${encodeURIComponent(termo)}&callback=retornoPesquisa`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    function retornoPesquisa(resultados) {
        const div = document.getElementById('listaResultados');
        const msg = document.getElementById('status-msg');
        div.innerHTML = "";
        
        if (resultados.length > 0) {
            div.style.display = "block";
            msg.innerText = resultados.length + " demanda(s) encontrada(s):";
            resultados.forEach(res => {
                const item = document.createElement('div');
                item.className = 'item-busca';
                item.innerHTML = `<strong>[${res.status}]</strong> ${res.nome} - ${res.assunto} (${res.data})`;
                item.onclick = () => carregarDemanda(res);
                div.appendChild(item);
            });
        } else {
            div.style.display = "none";
            msg.innerText = "Nada encontrado.";
        }
    }

    function carregarDemanda(res) {
        document.getElementById('linhaId').value = res.linha;
        document.getElementById('nome').value = res.nome;
        document.getElementById('telefone').value = res.telefone;
        document.getElementById('assunto').value = res.assunto;
        document.getElementById('descricao').value = res.descricao;
        document.getElementById('status').value = res.status;
        
        document.getElementById('listaResultados').style.display = "none";
        document.getElementById('formDemanda').className = "modo-edicao";
        document.getElementById('btnSalvar').innerText = "ATUALIZAR DEMANDA";
        document.getElementById('status-msg').innerText = "Editando demanda de " + res.nome;
        window.scrollTo(0, document.getElementById('status').offsetTop - 50);
    }

    function limparForm() {
        document.getElementById('formDemanda').reset();
        document.getElementById('linhaId').value = "";
        document.getElementById('formDemanda').className = "";
        document.getElementById('btnSalvar').innerText = "SALVAR NOVA DEMANDA";
        document.getElementById('status-msg').innerText = "";
    }

    async function enviar() {
        const btn = document.getElementById('btnSalvar');
        const msg = document.getElementById('status-msg');
        btn.disabled = true;
        msg.innerText = "Enviando...";

        const params = new URLSearchParams();
        params.append('linhaId', document.getElementById('linhaId').value);
        params.append('nome', document.getElementById('nome').value);
        params.append('telefone', document.getElementById('telefone').value);
        params.append('assunto', document.getElementById('assunto').value);
        params.append('descricao', document.getElementById('descricao').value);
        params.append('status', document.getElementById('status').value);

        try {
            await fetch(WEBAPP_URL, { method: 'POST', body: params, mode: 'no-cors' });
            msg.style.color = "green";
            msg.innerText = "✅ Salvo com sucesso na planilha!";
            setTimeout(limparForm, 2000);
        } catch (e) {
            msg.style.color = "red";
            msg.innerText = "❌ Erro ao salvar.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
